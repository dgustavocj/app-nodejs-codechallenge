version: "3.7"

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:14
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Application Services ────────────────────────────────────────

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: payment-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: payments
      KAFKA_BROKERS: kafka:29092
      PAYMENT_API_PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  outbox-relay:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: outbox-relay
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: payments
      KAFKA_BROKERS: kafka:29092
      OUTBOX_RELAY_POLL_INTERVAL_MS: 1000
      OUTBOX_RELAY_BATCH_SIZE: 100
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fraud-consumer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: fraud-consumer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: payments
      KAFKA_BROKERS: kafka:29092
      FRAUD_MAX_AMOUNT: 1000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ledger-consumer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: ledger-consumer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: payments
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pgdata:
